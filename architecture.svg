<svg width="680" height="920" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="920" fill="#ffffff"/>

<!-- ROW: two entry points -->
<g>
  <rect x="60" y="30" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="150" y="52" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Postman</text>
</g>
<g>
  <rect x="440" y="30" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="530" y="52" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">S3 file upload</text>
</g>

<text x="150" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">direct REST calls</text>
<line x1="150" y1="74" x2="150" y2="140" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<text x="530" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">event notification</text>
<line x1="530" y1="74" x2="530" y2="140" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Lambda router -->
<g>
  <rect x="440" y="140" width="180" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="530" y="160" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#412402">Lambda router</text>
  <text x="530" y="178" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#633806">reads S3 prefix, picks mode</text>
</g>

<!-- SQS branch from Lambda -->
<line x1="480" y1="196" x2="480" y2="240" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<g>
  <rect x="380" y="240" width="160" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="460" y="260" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#412402">SQS queue</text>
  <text x="460" y="278" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#633806">Mode 1 file pairing</text>
</g>
<line x1="460" y1="296" x2="530" y2="330" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Lambda to EC2 -->
<path d="M580 196 L580 220 L460 220" fill="none" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="150" y1="140" x2="150" y2="330" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M150 330 L150 350 L420 350" fill="none" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="580" y1="196" x2="580" y2="330" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- EC2 / Flask -->
<g>
  <rect x="240" y="330" width="280" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="380" y="352" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#04342C">EC2 — Flask REST API</text>
  <text x="380" y="372" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#085041">3 modes · scoring · orchestration</text>
</g>

<!-- EC2 fan out to three services -->
<line x1="300" y1="394" x2="160" y2="450" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="380" y1="394" x2="380" y2="450" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="460" y1="394" x2="600" y2="450" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
  <rect x="70" y="450" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="160" y="470" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">S3</text>
  <text x="160" y="488" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#712B13">resume &amp; JD files</text>
</g>

<g>
  <rect x="290" y="450" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="380" y="470" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">DynamoDB</text>
  <text x="380" y="488" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#712B13">vectors, scores, metadata</text>
</g>

<g>
  <rect x="510" y="450" width="170" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="595" y="470" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">AWS Bedrock</text>
  <text x="595" y="488" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#712B13">suggestions &amp; reranking</text>
</g>

<!-- divider -->
<line x1="40" y1="550" x2="640" y2="550" stroke="#5F5E5A" stroke-width="0.5" opacity="0.3"/>
<text x="340" y="572" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">CI/CD pipeline — deploys new code to ECR</text>

<!-- CI/CD row -->
<g>
  <rect x="60" y="600" width="140" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="130" y="624" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#26215C">GitHub</text>
</g>
<line x1="200" y1="624" x2="240" y2="624" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
  <rect x="240" y="600" width="140" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="310" y="624" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#26215C">CodePipeline</text>
</g>
<line x1="380" y1="624" x2="420" y2="624" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
  <rect x="420" y="600" width="140" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="490" y="624" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#26215C">CodeBuild</text>
</g>
<line x1="560" y1="624" x2="600" y2="624" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
  <rect x="600" y="600" width="60" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="630" y="624" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#26215C">ECR</text>
</g>

<!-- ECR back up to EC2 -->
<path d="M630 600 L630 380 L520 380" fill="none" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="640" y="500" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">docker pull</text>

</svg>
